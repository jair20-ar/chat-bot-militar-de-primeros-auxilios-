<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Instrucción Médica - FANB</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a1118;
            --bg-gradient: radial-gradient(circle at top, #112230 0%, #0a1118 100%);
            --card-bg: rgba(22, 33, 46, 0.7);
            --input-bg: rgba(10, 15, 24, 0.6);
            --border-color: rgba(255, 255, 255, 0.1);
            --border-focus: #00e5ff;
            --cyan-accent: #00e5ff;
            --cyan-hover: #00c4db;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ff4757;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(10, 17, 24, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--cyan-accent);
        }

        .btn-back svg {
            width: 20px;
            height: 20px;
            stroke: var(--text-main);
            fill: none;
            stroke-width: 2;
        }

        .title-container h1 {
            font-size: 1.1rem;
            letter-spacing: 2px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .title-underline {
            height: 2px;
            width: 60px;
            background: var(--cyan-accent);
            margin-top: 4px;
            box-shadow: 0 0 10px var(--cyan-accent);
        }

        .theme-toggle {
            background: transparent;
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 12px;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .theme-toggle svg {
            width: 18px;
            height: 18px;
            stroke: var(--cyan-accent);
            fill: none;
            stroke-width: 2;
        }

        /* --- MAIN CONTENT --- */
        main {
            padding: 40px 20px;
            max-width: 850px;
            margin: 0 auto;
            width: 100%;
            flex-grow: 1;
        }

        /* Forms & Cards */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
        }

        .card-general {
            border-top: 1px solid rgba(0, 229, 255, 0.3);
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            color: var(--text-main);
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .section-header svg {
            width: 18px;
            height: 18px;
            stroke: var(--cyan-accent);
            fill: none;
            stroke-width: 2;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        label span {
            color: var(--text-muted);
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 14px 16px;
            color: var(--text-main);
            font-size: 0.9rem;
            transition: all 0.3s;
            outline: none;
        }

        input::placeholder,
        textarea::placeholder {
            color: var(--text-muted);
            opacity: 0.7;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 2px rgba(0, 229, 255, 0.1);
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Steps Section */
        .steps-header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .steps-title {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .btn-add-step {
            background: var(--cyan-accent);
            color: #000;
            border: none;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 0.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
            transition: all 0.3s;
        }

        .btn-add-step:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
        }

        /* Step Card */
        .step-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .step-number {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid var(--cyan-accent);
            color: var(--cyan-accent);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .step-header h3 {
            font-size: 0.95rem;
            font-weight: 700;
        }

        .btn-image {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-main);
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-image:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--cyan-accent);
        }

        .btn-remove-step {
            margin-left: auto;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            transition: color 0.3s;
        }

        .btn-remove-step:hover {
            color: var(--danger);
        }

        /* Submit Button */
        .btn-save {
            width: 100%;
            background: var(--cyan-accent);
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-save:hover {
            background: var(--cyan-hover);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.4);
            transform: translateY(-2px);
        }

        /* Help Floating Button */
        .help-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-muted);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 100;
        }

        .help-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button class="btn-back" aria-label="Volver">
                <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </button>
            <div class="title-container">
                <h1>CREAR INSTRUCCIÓN</h1>
                <div class="title-underline"></div>
            </div>
        </div>
        <button class="theme-toggle" aria-label="Cambiar Tema">
            <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="5"/>
                <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
            </svg>
        </button>
    </header>

    <main>
        <section class="card card-general">
            <div class="section-header">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                INFORMACIÓN GENERAL
            </div>

            <div class="form-group">
                <label>Título de la Instrucción *</label>
                <input type="text" placeholder="Ej: Control de Hemorragia con Torniquete">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Categoría *</label>
                    <input type="text" placeholder="Ej: Control de Sangrado">
                </div>
                <div class="form-group">
                    <label>Nivel de Severidad *</label>
                    <select>
                        <option value="moderado">Moderado</option>
                        <option value="critico">Crítico</option>
                        <option value="leve">Leve</option>
                    </select>
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 0;">
                <label>Tiempo Estimado *</label>
                <input type="text" placeholder="Ej: 5 min">
            </div>
        </section>

        <div class="steps-header-container">
            <h2 class="steps-title">PASOS DE LA INSTRUCCIÓN</h2>
            <button class="btn-add-step" id="add-step-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                AGREGAR PASO
            </button>
        </div>

        <div id="steps-container">
            <section class="card step-card">
                <div class="step-header">
                    <div class="step-number">1</div>
                    <h3>PASO 1</h3>
                </div>

                <div class="form-group">
                    <label>Título del Paso *</label>
                    <input type="text" placeholder="Ej: Evaluación inicial de la escena">
                </div>

                <div class="form-group">
                    <label>Descripción Detallada *</label>
                    <textarea placeholder="Descripción detallada del procedimiento..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Duración (segundos)</label>
                        <input type="number" value="30">
                    </div>
                    <div class="form-group">
                        <label>Texto para Voz</label>
                        <input type="text" placeholder="Texto simplificado para síntesis de voz">
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 0;">
                    <label>Imagen de Referencia</label>
                    <button class="btn-image">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--cyan-accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                        Seleccionar Imagen
                    </button>
                </div>
            </section>
        </div>

        <button class="btn-save">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
            GUARDAR INSTRUCCIÓN
        </button>

    </main>

    <button class="help-btn">?</button>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const addStepBtn = document.getElementById('add-step-btn');
            const stepsContainer = document.getElementById('steps-container');
            let stepCount = 1;

            addStepBtn.addEventListener('click', () => {
                stepCount++;
                
                const stepHTML = `
                    <section class="card step-card" id="step-${stepCount}">
                        <div class="step-header">
                            <div class="step-number">${stepCount}</div>
                            <h3>PASO ${stepCount}</h3>
                            <button class="btn-remove-step" onclick="removeStep('step-${stepCount}')" title="Eliminar paso">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                            </button>
                        </div>

                        <div class="form-group">
                            <label>Título del Paso *</label>
                            <input type="text" placeholder="Ej: Siguiente paso del procedimiento">
                        </div>

                        <div class="form-group">
                            <label>Descripción Detallada *</label>
                            <textarea placeholder="Descripción detallada del procedimiento..."></textarea>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>Duración (segundos)</label>
                                <input type="number" value="30">
                            </div>
                            <div class="form-group">
                                <label>Texto para Voz</label>
                                <input type="text" placeholder="Texto simplificado para síntesis de voz">
                            </div>
                        </div>

                        <div class="form-group" style="margin-bottom: 0;">
                            <label>Imagen de Referencia</label>
                            <button class="btn-image">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--cyan-accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                                Seleccionar Imagen
                            </button>
                        </div>
                    </section>
                `;
                
                // Agregar el nuevo paso al final del contenedor
                stepsContainer.insertAdjacentHTML('beforeend', stepHTML);
                
                // Hacer scroll automático hacia el nuevo paso
                const newStep = document.getElementById(`step-${stepCount}`);
                newStep.scrollIntoView({ behavior: 'smooth', block: 'center' });
            });
            
            // Función para eliminar un paso (se anexa al objeto window para que el onclick del HTML la encuentre)
            window.removeStep = function(stepId) {
                const stepElement = document.getElementById(stepId);
                if(stepElement) {
                    stepElement.remove();
                    recalculateSteps();
                }
            };
            
            // Función para renumerar los pasos si se elimina uno del medio
            function recalculateSteps() {
                const stepCards = stepsContainer.querySelectorAll('.step-card');
                stepCount = 0; // Reiniciamos contador global
                
                stepCards.forEach((card, index) => {
                    stepCount = index + 1;
                    card.id = `step-${stepCount}`;
                    
                    const numberCircle = card.querySelector('.step-number');
                    const titleText = card.querySelector('h3');
                    const removeBtn = card.querySelector('.btn-remove-step');
                    
                    numberCircle.textContent = stepCount;
                    titleText.textContent = `PASO ${stepCount}`;
                    
                    if(removeBtn) {
                        removeBtn.setAttribute('onclick', `removeStep('step-${stepCount}')`);
                    }
                });
            }
        });
    </script>
</body>
</html>
