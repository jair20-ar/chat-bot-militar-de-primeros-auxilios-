<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Médico - FANB</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a1118;
            --panel-bg: rgba(22, 33, 46, 0.8);
            --border-color: rgba(6, 182, 212, 0.2);
            --cyan-accent: #00e5ff;
            --green-accent: #00ff88;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: radial-gradient(circle at top left, #112230 0%, var(--bg-dark) 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: linear-gradient(to bottom, rgba(10, 17, 24, 0.9), transparent);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .shield-icon-container {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
        }

        .shield-icon-container svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: var(--text-main);
            stroke-width: 1.5;
        }

        .title-container h1 {
            font-size: 1.2rem;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .title-container p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 2px;
            text-transform: capitalize;
            border-bottom: 1px solid var(--cyan-accent);
            display: inline-block;
            padding-bottom: 2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-back {
            background: transparent;
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 12px;
            width: 45px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--cyan-accent);
        }

        .btn-back:hover {
            border-color: var(--cyan-accent);
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.2);
            background: rgba(0, 229, 255, 0.05);
        }

        .btn-back svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        .theme-toggle {
            background: transparent;
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 12px;
            width: 45px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            border-color: var(--cyan-accent);
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.2);
        }

        .theme-toggle svg {
            width: 20px;
            height: 20px;
            stroke: var(--cyan-accent);
            fill: none;
            stroke-width: 2;
        }

        /* --- MAIN CONTENT --- */
        main {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            flex-grow: 1;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-icon svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: var(--cyan-accent);
            stroke-width: 1.5;
        }

        .stat-card:nth-child(2) .stat-icon svg { stroke: var(--green-accent); }
        .stat-card:nth-child(3) .stat-icon svg { stroke: var(--text-main); }

        .stat-info span {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .stat-info h2 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .val-cyan { color: var(--cyan-accent); }
        .val-green { color: var(--green-accent); }
        .val-white { color: var(--text-main); font-size: 1rem !important; }

        /* Main Button */
        .btn-create {
            width: 100%;
            background: var(--green-accent);
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 18px;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
            transition: all 0.3s ease;
            margin-bottom: 40px;
        }

        .btn-create:hover {
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.4);
            transform: translateY(-2px);
        }

        /* Section Title */
        .section-title {
            text-align: center;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: var(--text-main);
            margin-bottom: 20px;
        }

        /* Instructions Grid */
        .instructions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .instruction-card {
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: all 0.3s ease;
        }

        .instruction-card:hover {
            border-color: var(--cyan-accent);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.15);
        }

        .instruction-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .instruction-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            font-size: 0.75rem;
        }

        .badge {
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid rgba(0, 229, 255, 0.3);
            padding: 4px 8px;
            border-radius: 4px;
            color: var(--cyan-accent);
        }

        .badge.danger {
            background: rgba(255, 68, 68, 0.1);
            border-color: rgba(255, 68, 68, 0.3);
            color: #ff4444;
        }

        .badge.warning {
            background: rgba(255, 193, 7, 0.1);
            border-color: rgba(255, 193, 7, 0.3);
            color: #ffc107;
        }

        .instruction-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.4;
            flex-grow: 1;
        }

        .instruction-actions {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }

        .btn-edit, .btn-delete {
            flex: 1;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-edit:hover {
            background: rgba(0, 229, 255, 0.1);
            color: var(--cyan-accent);
            border-color: var(--cyan-accent);
        }

        .btn-delete:hover {
            background: rgba(255, 68, 68, 0.1);
            color: #ff4444;
            border-color: #ff4444;
        }

        /* Empty State */
        .empty-state {
            background: rgba(15, 23, 33, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 60px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            grid-column: 1 / -1;
        }

        .empty-icon {
            opacity: 0.4;
        }

        .empty-icon svg {
            width: 40px;
            height: 40px;
            fill: none;
            stroke: var(--text-muted);
            stroke-width: 1.5;
        }

        .empty-state h3 {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .empty-state p {
            font-size: 0.85rem;
            color: rgba(148, 163, 184, 0.7);
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--green-accent);
            border-radius: 8px;
            color: var(--green-accent);
            font-size: 0.9rem;
            z-index: 2000;
            animation: slideInRight 0.3s ease;
        }

        .toast.error {
            background: rgba(255, 68, 68, 0.1);
            border-color: #ff4444;
            color: #ff4444;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Help Button */
        .help-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-muted);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .help-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: var(--text-main);
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .instructions-grid {
                grid-template-columns: 1fr;
            }
            main {
                padding: 20px;
            }
            header {
                padding: 15px 20px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <div class="shield-icon-container">
                <svg viewBox="0 0 24 24">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
            </div>
            <div class="title-container">
                <h1>PANEL MÉDICO</h1>
                <p id="user-name-display">Cargando usuario...</p>
            </div>
        </div>
        <div class="header-right">
            <button class="btn-back" onclick="goBackToMedicos()" title="Volver a Médicos">
                <svg viewBox="0 0 24 24">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </button>
            <button class="theme-toggle" aria-label="Toggle Theme">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="5"/>
                    <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                </svg>
            </button>
        </div>
    </header>

    <main>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                </div>
                <div class="stat-info">
                    <span>Total Instrucciones</span>
                    <h2 class="val-cyan" id="total-count">0</h2>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 9c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2m0-8C6.48 1 2 5.48 2 11s4.48 10 10 10 10-4.48 10-10S17.52 1 12 1zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/></svg>
                </div>
                <div class="stat-info">
                    <span>Críticas</span>
                    <h2 class="val-green" id="critical-count">0</h2>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                </div>
                <div class="stat-info">
                    <span>Especialización</span>
                    <h2 class="val-white">Medicina de Emergencia</h2>
                </div>
            </div>
        </div>

        <a href="/emergencia.html" style="text-decoration: none;">
            <button class="btn-create">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                CREAR NUEVA INSTRUCCIÓN MÉDICA
            </button>
        </a>

        <h3 class="section-title">INSTRUCCIONES REGISTRADAS</h3>

        <div class="instructions-grid" id="instructions-container">
            <div class="empty-state">
                <div class="empty-icon">
                    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                </div>
                <h3>No hay instrucciones registradas aún.</h3>
                <p>Cree su primera instrucción médica usando el botón de arriba.</p>
            </div>
        </div>
    </main>

    <button class="help-btn" onclick="showHelp()">?</button>

    <script>
        const API_URL = 'http://localhost:3001';
        let instructions = [];

        // Cargar instrucciones al iniciar
        document.addEventListener('DOMContentLoaded', () => {
            loadUserData();
            loadInstructions();
        });

        // Datos del usuario
        function loadUserData() {
            const medicoData = localStorage.getItem('medicoData');
            const userData = medicoData ? JSON.parse(medicoData) : null;
            const displayElement = document.getElementById('user-name-display');
            if (userData) {
                let prefijo = "Dr.";
                displayElement.textContent = `${prefijo} ${userData.nombre}`;
            }
        }

        // Cargar todas las instrucciones
        function loadInstructions() {
            fetch(`${API_URL}/api/instrucciones`)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        instructions = data.data.map(inst => {
                            const pasos = typeof inst.pasos === 'string' ? JSON.parse(inst.pasos) : inst.pasos;
                            return { ...inst, pasos };
                        });
                        renderInstructions();
                        updateStats();
                    }
                })
                .catch(err => console.error('Error:', err));
        }

        // Renderizar instrucciones
        function renderInstructions() {
            const container = document.getElementById('instructions-container');
            if (instructions.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                        </div>
                        <h3>No hay instrucciones registradas aún.</h3>
                        <p>Cree su primera instrucción médica usando el botón de arriba.</p>
                    </div>
                `;
                return;
            }
            container.innerHTML = instructions.map(inst => {
                const severidadBadge = inst.severidad ? `<span class="badge ${inst.severidad === 'critico' ? 'danger' : inst.severidad === 'moderado' ? 'warning' : ''}">${inst.severidad.toUpperCase()}</span>` : '';
                const tiempoBadge = inst.tiempo_estimado ? `<span class="badge">${inst.tiempo_estimado}</span>` : '';
                const categoriaBadge = inst.categoria ? `<span class="badge">${inst.categoria}</span>` : '';
                return `
                    <div class="instruction-card">
                        <div class="instruction-title">${inst.titulo}</div>
                        <div class="instruction-meta">
                            ${categoriaBadge}
                            ${severidadBadge}
                            ${tiempoBadge}
                        </div>
                        <div class="instruction-desc">${Array.isArray(inst.pasos) ? inst.pasos.length + ' pasos' : 'Ver detalles'}</div>
                        <div class="instruction-actions">
                            <a href="/emergencia.html?edit=${inst.id}" style="text-decoration: none; flex: 1;">
                                <button class="btn-edit" style="width: 100%;">✏️ Editar</button>
                            </a>
                            <button class="btn-delete" onclick="deleteInstruction(${inst.id})">🗑️ Eliminar</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Actualizar estadísticas
        function updateStats() {
            document.getElementById('total-count').textContent = instructions.length;
            const critical = instructions.filter(i => i.severidad === 'critico').length;
            document.getElementById('critical-count').textContent = critical;
        }

        // Eliminar instrucción
        function deleteInstruction(id) {
            if (confirm('¿Está seguro de que desea eliminar esta instrucción?')) {
                fetch(`${API_URL}/api/instrucciones/${id}`, { method: 'DELETE' })
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            showToast('✅ Instrucción eliminada');
                            loadInstructions();
                        } else {
                            showToast('❌ Error al eliminar', true);
                        }
                    })
                    .catch(err => { console.error(err); showToast('❌ Error de conexión', true); });
            }
        }

        // Volver a médicos
        function goBackToMedicos() {
            // Limpiar datos del usuario
            localStorage.removeItem('medicoData');
            // Redirigir a página de médicos
            window.location.href = 'http://localhost:3001/medicos.html';
        }

        // Notificaciones
        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'error' : ''}`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Ayuda
        function showHelp() {
            alert('📝 CREAR: Click en "CREAR NUEVA INSTRUCCIÓN MÉDICA"\n✏️ EDITAR: Click en "Editar" en la tarjeta\n🗑️ ELIMINAR: Click en "Eliminar" en la tarjeta\n🔙 VOLVER: Click en el botón de flecha en el header');
        }
    </script>
</body>
</html>
