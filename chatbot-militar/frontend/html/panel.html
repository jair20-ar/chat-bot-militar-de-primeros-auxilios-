<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Médico - FANB</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a1118;
            --panel-bg: rgba(22, 33, 46, 0.8);
            --border-color: rgba(6, 182, 212, 0.2);
            --cyan-accent: #00e5ff;
            --green-accent: #00ff88;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: radial-gradient(circle at top left, #112230 0%, var(--bg-dark) 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: linear-gradient(to bottom, rgba(10, 17, 24, 0.9), transparent);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .shield-icon-container {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
        }

        .shield-icon-container svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: var(--text-main);
            stroke-width: 1.5;
        }

        .title-container h1 {
            font-size: 1.2rem;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .title-container p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 2px;
            text-transform: capitalize;
            border-bottom: 1px solid var(--cyan-accent);
            display: inline-block;
            padding-bottom: 2px;
        }

        .theme-toggle {
            background: transparent;
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 12px;
            width: 45px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            border-color: var(--cyan-accent);
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.2);
        }

        .theme-toggle svg {
            width: 20px;
            height: 20px;
            stroke: var(--cyan-accent);
            fill: none;
            stroke-width: 2;
        }

        /* --- MAIN CONTENT --- */
        main {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            flex-grow: 1;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-icon svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: var(--cyan-accent);
            stroke-width: 1.5;
        }

        .stat-card:nth-child(2) .stat-icon svg { stroke: var(--green-accent); }
        .stat-card:nth-child(3) .stat-icon svg { stroke: var(--text-main); }

        .stat-info span {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .stat-info h2 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .val-cyan { color: var(--cyan-accent); }
        .val-green { color: var(--green-accent); }
        .val-white { color: var(--text-main); font-size: 1rem !important; }

        /* Main Button */
        .btn-create {
            width: 100%;
            background: var(--green-accent);
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 18px;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
            transition: all 0.3s ease;
            margin-bottom: 40px;
        }

        .btn-create:hover {
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.4);
            transform: translateY(-2px);
        }

        /* Registered Instructions Section */
        .section-title {
            text-align: center;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: var(--text-main);
            margin-bottom: 20px;
        }

        .empty-state {
            background: rgba(15, 23, 33, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 60px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .empty-icon {
            opacity: 0.4;
        }

        .empty-icon svg {
            width: 40px;
            height: 40px;
            fill: none;
            stroke: var(--text-muted);
            stroke-width: 1.5;
        }

        .empty-state h3 {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .empty-state p {
            font-size: 0.85rem;
            color: rgba(148, 163, 184, 0.7);
        }

        /* Help Floating Button */
        .help-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-muted);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .help-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <div class="shield-icon-container">
                <svg viewBox="0 0 24 24">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
            </div>
            <div class="title-container">
                <h1>PANEL MÉDICO</h1>
                <p id="user-name-display">Cargando usuario...</p>
            </div>
        </div>
        <button class="theme-toggle" aria-label="Toggle Theme">
            <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="5"/>
                <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
            </svg>
        </button>
    </header>

    <main>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                </div>
                <div class="stat-info">
                    <span>Total Protocolos</span>
                    <h2 class="val-cyan">0</h2>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                </div>
                <div class="stat-info">
                    <span>Críticos</span>
                    <h2 class="val-green">0</h2>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                </div>
                <div class="stat-info">
                    <span>Especialización</span>
                    <h2 class="val-white">Medicina de Emergencia</h2>
                </div>
            </div>
        </div>

        <button class="btn-create">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            CREAR NUEVA INSTRUCCIÓN MÉDICA
        </button>

        <h3 class="section-title">INSTRUCCIONES REGISTRADAS</h3>

        <div class="empty-state">
            <div class="empty-icon">
                <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            </div>
            <h3>No hay instrucciones registradas aún.</h3>
            <p>Cree su primera instrucción médica usando el botón de arriba.</p>
        </div>
    </main>

    <button class="help-btn">?</button>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ==========================================
            // LÓGICA DE SIMULACIÓN DE BASE DE DATOS
            // ==========================================
            
            // Simulación: Aquí idealmente harías un fetch() a tu API o leerías de sessionStorage
            // Ejemplo: const userData = JSON.parse(sessionStorage.getItem('userAuthData'));
            
            // Datos de prueba (puedes cambiar 'rol' a 'enfermero' para probar)
            const userData = {
                nombre: "jair molleda",
                rol: "medico" // Puede ser "medico" o "enfermero"
            };

            // Referencia al elemento HTML donde va el nombre
            const displayElement = document.getElementById('user-name-display');

            if (userData) {
                let prefijo = "";
                
                // Formatear el prefijo según el rol en la base de datos
                if (userData.rol.toLowerCase() === "medico" || userData.rol.toLowerCase() === "médico") {
                    prefijo = "Dr.";
                } else if (userData.rol.toLowerCase() === "enfermero" || userData.rol.toLowerCase() === "enfermera") {
                    prefijo = "Enf.";
                } else {
                    prefijo = "Personal:"; // Fallback por si hay otro rol
                }

                // Inyectar el texto final en el HTML
                displayElement.textContent = `${prefijo} ${userData.nombre}`;
            } else {
                displayElement.textContent = "Usuario Desconocido";
            }
        });
    </script>
</body>
</html>
