<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Médico | TACMED FANB</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #071017;
            --bg-card: #15222b;
            --bg-input: #232d36;
            --cyan-accent: #00e5ff;
            --cyan-dim: rgba(0, 229, 255, 0.2);
            --text-main: #ffffff;
            --text-muted: #8b9bb4;
            --border-color: #2c3a47;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 70% 50%, #0d2529 0%, var(--bg-dark) 80%);
            font-family: 'Montserrat', sans-serif;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER TÁCTICO --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .back-btn:hover { background: rgba(255, 255, 255, 0.1); }

        .header-title {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
        }

        .header-title::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 40%;
            height: 2px;
            background: var(--cyan-accent);
            box-shadow: 0 0 10px var(--cyan-accent);
        }

        .theme-btn {
            background: transparent;
            border: 1px solid var(--cyan-accent);
            border-radius: 8px;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--cyan-accent);
            cursor: pointer;
        }

        /* --- CONTENIDO PRINCIPAL --- */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .shield-icon-container {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid rgba(0, 229, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            background: radial-gradient(circle, rgba(0, 229, 255, 0.1) 0%, transparent 70%);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.1);
        }

        .shield-icon-container svg {
            width: 35px;
            height: 35px;
            fill: none;
            stroke: var(--cyan-accent);
            stroke-width: 1.5;
        }

        h1 {
            font-size: 1.2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 0 0 10px 0;
            text-align: center;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        /* --- TARJETA DE FORMULARIO --- */
        .login-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 35px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .form-label svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: var(--cyan-accent);
            stroke-width: 2;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        input {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 14px 15px;
            color: white;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--cyan-accent);
        }

        input::placeholder {
            color: var(--text-muted);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0;
            display: flex;
        }

        .toggle-password:hover { color: white; }

        .submit-btn {
            width: 100%;
            background: var(--cyan-accent);
            color: black;
            border: none;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 1px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: #00c6dd;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
        }

        .submit-btn:disabled {
            background: #666;
            cursor: not-allowed;
            box-shadow: none;
        }

        .submit-btn svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: black;
            stroke-width: 2;
        }

        .demo-text {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 20px;
        }

        .demo-text span {
            color: var(--cyan-accent);
        }

        /* --- MENSAJE DE ERROR --- */
        .alert-message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            text-align: center;
            display: none;
        }

        .alert-message.show {
            display: block;
        }

        .alert-message.error {
            background: rgba(255, 50, 50, 0.1);
            border: 1px solid rgba(255, 50, 50, 0.5);
            color: #ff6b6b;
        }

        /* --- NUEVA SECCIÓN DE REGISTRO (ABAJO) --- */
        .register-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 25px;
            gap: 12px;
        }

        .register-label {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .register-link-btn {
            background: #00ffaa;
            color: #000000;
            border: none;
            border-radius: 25px;
            padding: 12px 24px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 0.78rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 255, 170, 0.2);
            width: 100%;
            text-align: center;
        }

        .register-link-btn:hover {
            background: #00e599;
            box-shadow: 0 6px 20px rgba(0, 255, 170, 0.4);
            transform: translateY(-2px);
        }

        .register-link-btn:active {
            transform: translateY(0);
        }

        /* --- MODAL DE BIENVENIDA --- */
        .welcome-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease-in;
        }

        .welcome-modal.show {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .welcome-content {
            background: var(--bg-card);
            border: 1px solid rgba(0, 229, 255, 0.3);
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
            animation: slideIn 0.5s ease-out;
        }

        .welcome-icon {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(0, 229, 255, 0.2) 0%, transparent 70%);
            border: 2px solid rgba(0, 229, 255, 0.4);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 30px;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.2);
        }

        .welcome-icon svg {
            width: 50px;
            height: 50px;
            fill: none;
            stroke: var(--cyan-accent);
            stroke-width: 2;
        }

        .welcome-title {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 15px;
            color: var(--cyan-accent);
        }

        .welcome-name {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 30px;
            color: var(--text-main);
        }

        .welcome-loading {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
        }

        .loading-dot {
            width: 8px;
            height: 8px;
            background: var(--cyan-accent);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .loading-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.3;
            }
            50% {
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <button class="back-btn" onclick="window.location.href='http://localhost:3001/'">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            <div class="header-title">ACCESO MÉDICO</div>
        </div>
        <button class="theme-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
    </header>

    <main>
        <div class="shield-icon-container">
            <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><rect x="9" y="9" width="6" height="8" rx="2"/><path d="M12 13v2"/></svg>
        </div>
        
        <h1>PERSONAL MÉDICO AUTORIZADO</h1>
        <p class="subtitle">Ingrese sus credenciales de acceso</p>

        <div class="login-card">
            <div class="alert-message" id="alertMessage"></div>

            <form id="login-form">
                
                <div class="form-group">
                    <div class="form-label">
                        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        Usuario (ID Médico)
                    </div>
                    <div class="input-wrapper">
                        <input type="text" id="id_medico" placeholder="Ingrese su cédula o ID" required>
                    </div>
                </div>

                <div class="form-group">
                    <div class="form-label">
                        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        Contraseña
                    </div>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" onclick="togglePassword()">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    INICIAR SESIÓN
                </button>

                <div class="demo-text">Demo: <span>1234567890</span> / <span>password123</span></div>

                <div class="register-container">
                    <div class="register-label">¿No tiene una cuenta?</div>
                    <button type="button" class="register-link-btn" onclick="window.location.href='registro.html'">
                        REGISTRARSE COMO PERSONAL MÉDICO
                    </button>
                </div>
            </form>
        </div>
    </main>

    <!-- MODAL DE BIENVENIDA -->
    <div class="welcome-modal" id="welcomeModal">
        <div class="welcome-content">
            <div class="welcome-icon">
                <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <div class="welcome-title">¡BIENVENIDO!</div>
            <div class="welcome-name" id="welcomeName"></div>
            <div class="welcome-loading">
                <div class="loading-dot"></div>
                <div class="loading-dot"></div>
                <div class="loading-dot"></div>
            </div>
        </div>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            if (input.type === "password") {
                input.type = "text";
            } else {
                input.type = "password";
            }
        }

        function showAlert(message, type) {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.textContent = message;
            alertDiv.className = `alert-message show ${type}`;
            setTimeout(() => {
                alertDiv.classList.remove('show');
            }, 5000);
        }

        function showWelcomeModal(nombre) {
            const modal = document.getElementById('welcomeModal');
            const welcomeName = document.getElementById('welcomeName');
            welcomeName.textContent = nombre.toUpperCase();
            modal.classList.add('show');

            // Redirigir después de 3 segundos
            setTimeout(() => {
                window.location.href = 'http://localhost:3001/panel.html';
            }, 3000);
        }

        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const id_medico = document.getElementById('id_medico').value.trim();
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerHTML;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Verificando...';

            try {
                const response = await fetch('http://localhost:3001/medicos/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        id_medico: id_medico,
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Guardar datos del médico en localStorage
                    localStorage.setItem('medicoData', JSON.stringify({
                        id_medico: data.id_medico,
                        nombre: data.nombre
                    }));
                    
                    // Mostrar modal de bienvenida
                    showWelcomeModal(data.nombre);
                } else {
                    showAlert(data.error || 'Credenciales incorrectas', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalText;
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('Error de conexión. Verifique que el servidor esté funcionando.', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        });
    </script>
</body>
</html>
