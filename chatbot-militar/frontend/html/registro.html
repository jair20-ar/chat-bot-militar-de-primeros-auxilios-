<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Personal Médico</title>
    <style>
        :root {
            --bg-dark: #0a0f14;
            --bg-card: #151b22;
            --bg-input: #1e252c;
            --border-input: #2d3741;
            --accent-green: #00ffa3;
            --accent-green-hover: #33ffb5;
            --text-main: #ffffff;
            --text-muted: #8b949e;
            --card-border: #1a362d;
            --glow-color: rgba(0, 255, 163, 0.15);
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 30%, var(--glow-color) 0%, transparent 60%);
            background-repeat: no-repeat;
        }
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .nav-left { display: flex; align-items: center; gap: 15px; }
        .back-btn {
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,255,255,0.05); display: flex;
            align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.1); cursor: pointer; color: var(--text-main);
        }
        .page-title {
            font-size: 1.2rem; font-weight: 600; letter-spacing: 2px; margin: 0; position: relative;
        }
        .page-title::after {
            content: ''; position: absolute; left: 0; bottom: -8px; width: 40px; height: 2px; background: linear-gradient(90deg, var(--accent-green), transparent);
        }
        .theme-btn {
            width: 40px; height: 40px; border-radius: 10px;
            background: rgba(255,255,255,0.02); border: 1px solid rgba(0, 255, 163, 0.2);
            display: flex; align-items: center; justify-content: center; color: #00d2ff; cursor: pointer;
        }
        .main-container { display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        .avatar-container {
            width: 64px; height: 64px; border-radius: 50%;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center; margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 163, 0.1); color: var(--text-main);
        }
        .header-text { text-align: center; margin-bottom: 30px; }
        .header-text h1 { font-size: 1.2rem; letter-spacing: 2px; margin: 0 0 8px 0; font-weight: 600; }
        .header-text p { font-size: 0.8rem; color: var(--text-muted); margin: 0; }
        .form-card {
            background-color: var(--bg-card); border: 1px solid var(--card-border); border-radius: 16px;
            padding: 30px; width: 100%; max-width: 420px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); box-sizing: border-box;
        }
        .form-group { margin-bottom: 20px; }
        .form-label {
            display: flex; align-items: center; gap: 8px;
            color: #ffffff; font-size: 0.8rem; font-weight: 600; margin-bottom: 8px;
        }
        .form-label svg { color: var(--accent-green); width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .form-control {
            width: 100%; background-color: var(--bg-input); border: 1px solid var(--border-input);
            color: #ffffff; padding: 12px 16px; border-radius: 8px; font-size: 0.85rem;
            outline: none; transition: border-color 0.2s; box-sizing: border-box; appearance: none;
        }
        .form-control:focus { border-color: var(--accent-green); }
        .form-control::placeholder { color: rgba(255, 255, 255, 0.4); }
        .toggle-password {
            position: absolute; right: 15px; background: none; border: none;
            color: rgba(255, 255, 255, 0.4); cursor: pointer; padding: 0; display: flex;
        }
        .select-arrow {
            position: absolute; right: 15px; pointer-events: none;
            color: rgba(255, 255, 255, 0.4); display: flex;
        }
        .submit-btn {
            width: 100%; background-color: var(--accent-green); color: #000000; border: none;
            padding: 14px; border-radius: 8px; font-size: 0.85rem; font-weight: 700;
            letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 10px;
            cursor: pointer; margin-top: 10px; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .submit-btn:hover {
            background-color: var(--accent-green-hover);
            transform: translateY(-4px); 
            box-shadow: 0 8px 20px rgba(0, 255, 163, 0.35); 
        }
        .submit-btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 10px rgba(0, 255, 163, 0.2);
        }
        .submit-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; }
    </style>
</head>
<body>

    <header class="top-nav">
        <div class="nav-left">
            <div class="back-btn" id="btn-volver" title="Volver a inicio de sesión">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </div>
            <h2 class="page-title">REGISTRO MÉDICO</h2>
        </div>
        <div class="theme-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        </div>
    </header>

    <main class="main-container">
        
        <div class="avatar-container">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
        </div>
        <div class="header-text">
            <h1>NUEVO PERSONAL MÉDICO</h1>
            <p>Complete el formulario para registrarse en el sistema</p>
        </div>

        <div class="form-card">
            <form id="registro-form" autocomplete="off">
                
                <div class="form-group">
                    <div class="form-label">
                        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        Nombre Completo
                    </div>
                    <div class="input-wrapper">
                        <input type="text" name="nombre" class="form-control" placeholder="Nombre y apellido" required>
                    </div>
                </div>

                <div class="form-group">
                    <div class="form-label">
                        <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                        Correo Electrónico
                    </div>
                    <div class="input-wrapper">
                        <input type="email" name="email" class="form-control" placeholder="correo@ejemplo.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <div class="form-label">
                        <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                        Cédula de Identidad
                    </div>
                    <div class="input-wrapper">
                        <input type="text" name="cedula" class="form-control" placeholder="V-12345678" required>
                    </div>
                </div>

                <div class="form-group">
                    <div class="form-label">
                        <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                        Especialización
                    </div>
                    <div class="input-wrapper">
                        <select class="form-control" name="especializacion" required>
                            <option value="" disabled selected hidden>Seleccione una especialización</option>
                            <option value="Paramédico de Combate">Paramédico de Combate</option>
                            <option value="Traumatología Táctica">Traumatología Táctica</option>
                            <option value="Cirugía General">Cirugía General</option>
                        </select>
                        <div class="select-arrow">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <div class="form-label">
                        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        Contraseña
                    </div>
                    <div class="input-wrapper">
                        <input type="password" id="pass-input" name="password" class="form-control" placeholder="Mínimo 6 caracteres" required>
                        <button type="button" class="toggle-password" onclick="togglePass('pass-input')">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <div class="form-label">
                        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        Confirmar Contraseña
                    </div>
                    <div class="input-wrapper">
                        <input type="password" id="pass-confirm" class="form-control" placeholder="Repita la contraseña" required>
                        <button type="button" class="toggle-password" onclick="togglePass('pass-confirm')">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="submit-btn">
                    <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
                    REGISTRAR PERSONAL MÉDICO
                </button>

            </form>
        </div>
    </main>

    <script>
        function togglePass(inputId) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
            } else {
                input.type = "password";
            }
        }

        // Volver al login (inicio de sesión) al hacer click en flecha volver
        document.getElementById('btn-volver').onclick = function() {
            window.location.href = 'medicos.html';
        };

        // --- Registro Médico ENVÍO ---
        document.getElementById('registro-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const nombre = this.nombre.value.trim();
            const email = this.email.value.trim();
            const cedula = this.cedula.value.trim();
            const especializacion = this.especializacion.value;
            const password = this.password.value;
            const password2 = document.getElementById('pass-confirm').value;

            if(password.length < 6){
                alert("La contraseña debe tener al menos 6 caracteres.");
                return;
            }
            if(password !== password2) {
                alert("Las contraseñas no coinciden.");
                return;
            }

            const res = await fetch('/medicos/registro', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ nombre, email, cedula, especializacion, password })
            });
            const data = await res.json();
            if (data.ok) {
                alert("¡Registro exitoso! Ahora puedes iniciar sesión.");
                // Redirige automáticamente al login
                window.location.href = 'medicos.html';
            } else {
                alert(data.error ? data.error : "Error en el registro.");
            }
        });
    </script>
</body>
</html>
