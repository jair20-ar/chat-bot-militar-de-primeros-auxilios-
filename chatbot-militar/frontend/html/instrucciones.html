<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROTOCOLO MÉDICO | MEDIC-BOT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* === VARIABLES TÁCTICAS === */
        :root {
            --bg-main: #0B111A;
            --bg-card: #15202E;
            --bg-button: #1E293B;
            --cyan: #00E5FF;
            --cyan-hover: #33eeff;
            --text-main: #FFFFFF;
            --text-muted: #8B9BB4;
            --border-color: rgba(0, 229, 255, 0.15);
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        /* === CONTENEDOR PRINCIPAL === */
        .app-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* === CABECERA === */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .icon-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .icon-btn:hover {
            background: rgba(0, 229, 255, 0.1);
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
            color: var(--cyan);
        }

        .titles span {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--text-main);
            text-transform: uppercase;
            display: block;
            margin-bottom: 4px;
        }

        .titles h1 {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* === ÁREA VISUAL (AVATAR / IMAGEN) === */
        .visual-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 20px 0;
        }

        .avatar-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle, #1A3644 0%, #0F1D2B 100%);
            border: 2px solid rgba(0, 229, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.1);
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
            padding: 10px;
            overflow: hidden;
        }

        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        /* Switch 3D/Imagen integrado y minimalista */
        .view-toggle {
            display: flex;
            gap: 10px;
        }

        .view-toggle button {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
            padding: 5px 10px;
        }

        .view-toggle button.active {
            color: var(--cyan);
            font-weight: 600;
            text-shadow: 0 0 8px rgba(0, 229, 255, 0.5);
        }

        /* === BARRA DE PROGRESO === */
        .progress-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .progress-labels .highlight { color: var(--cyan); }

        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background: var(--bg-button);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            width: 40%;
            height: 100%;
            background: var(--cyan);
            box-shadow: 0 0 10px var(--cyan);
            transition: width 0.3s ease;
        }

        /* === CONTROLES DE REPRODUCCIÓN === */
        .playback-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 10px 0;
        }

        .play-btn {
            width: 55px;
            height: 55px;
            border-radius: 16px;
            background: var(--cyan);
            border: none;
            color: var(--bg-main);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        }

        .play-btn:hover {
            background: var(--cyan-hover);
            transform: scale(1.1);
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.5);
        }

        .play-btn.paused {
            background: #ff9500;
        }

        /* Botón de voz con efecto cuando está mutedo */
        .voice-btn.muted {
            background: #666;
            border-color: #666;
            color: white;
        }

        .voice-btn.muted::after {
            content: '🔇';
            position: absolute;
            font-size: 20px;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 71, 87, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
        }

        /* === TARJETA DE INSTRUCCIÓN === */
        .instruction-card {
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            position: relative;
            background: linear-gradient(180deg, rgba(21, 32, 46, 0.5) 0%, rgba(11, 17, 26, 0.5) 100%);
        }

        .instruction-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .step-badge {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid var(--cyan);
            color: var(--cyan);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .instruction-card h3 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .instruction-card p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .step-image {
            margin-top: 15px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .step-image img {
            width: 100%;
            height: auto;
            max-height: 300px;
            object-fit: cover;
            display: block;
        }

        /* === NAVEGACIÓN DE PASOS (BOTONES INFERIORES) === */
        .step-navigation {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .step-nav-btn {
            flex: 1;
            min-width: 50px;
            padding: 15px 0;
            background: var(--bg-card);
            border: 1px solid transparent;
            border-radius: 12px;
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .step-nav-btn:hover:not(.active) {
            border-color: rgba(0, 229, 255, 0.4);
            transform: translateY(-5px);
            background: #1A283A;
            color: var(--text-main);
            box-shadow: 0 5px 15px rgba(0, 229, 255, 0.1);
        }

        .step-nav-btn.active {
            background: var(--cyan);
            color: var(--bg-main);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
            transform: scale(1.02);
        }

        /* === LOADING === */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 229, 255, 0.1);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3);
            color: #ff4444;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

    </style>
</head>
<body>

    <div class="app-container">
        
        <header class="header">
            <div class="header-left">
                <button class="icon-btn" onclick="window.history.back()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </button>
                <div class="titles">
                    <span id="titulo-tipo">PROTOCOLO MÉDICO</span>
                    <h1 id="titulo-instruccion">Cargando...</h1>
                </div>
            </div>
            <button class="icon-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            </button>
        </header>

        <div class="visual-area">
            <div class="avatar-circle" id="visual-content">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#00E5FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
            
            <div class="view-toggle">
                <button class="active" id="btn-vista-3d" onclick="toggleView('3d', this)">Modelo 3D</button>
                <span style="color:var(--text-muted)">-</span>
                <button id="btn-vista-img" onclick="toggleView('img', this)">Imagen</button>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-labels">
                <span><span class="highlight">⚡ Paso <span id="paso-actual">1</span></span> de <span id="total-pasos">1</span></span>
                <span class="highlight" id="tiempo-actual">0:00</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-fill" id="progress-bar"></div>
            </div>
        </div>

        <div class="playback-controls">
            <button class="icon-btn" id="btn-retroceder">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
            </button>
            
            <button class="play-btn" id="btn-pausa" onclick="togglePlayPause()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
            </button>
            
            <button class="icon-btn voice-btn" id="btn-voz" onclick="toggleMute()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
            </button>
        </div>

        <div id="contenedor-principal">
            <div class="loading">
                <div class="spinner"></div>
                <p>Cargando instrucción...</p>
            </div>
        </div>

    </div>

    <script>
        const API_URL = 'http://localhost:3001';
        let instructionData = null;
        let currentStep = 0;
        let synth = window.speechSynthesis;
        let isPlaying = false;
        let isMuted = false;
        let nextStepTimeout = null;

        document.addEventListener('DOMContentLoaded', () => {
            loadInstruction();
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('btn-retroceder').addEventListener('click', previousStep);
        }

        function loadInstruction() {
            const instructionId = sessionStorage.getItem('selectedInstructionId');
            
            if (!instructionId) {
                showError('No se especificó instrucción');
                return;
            }

            fetch(`${API_URL}/api/instrucciones/${instructionId}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        instructionData = data.data;
                        displayInstruction();
                    } else {
                        showError('No se encontró la instrucción');
                    }
                })
                .catch(err => {
                    console.error('Error:', err);
                    showError('Error al cargar la instrucción');
                });
        }

        function displayInstruction() {
            if (!instructionData) return;

            // Actualizar título
            document.getElementById('titulo-instruccion').textContent = instructionData.titulo;
            document.getElementById('titulo-tipo').textContent = instructionData.categoria.toUpperCase();

            // Parsear pasos
            const pasos = typeof instructionData.pasos === 'string' ? 
                JSON.parse(instructionData.pasos) : instructionData.pasos;

            // Actualizar total de pasos
            document.getElementById('total-pasos').textContent = pasos.length;

            // Mostrar primer paso
            currentStep = 0;
            showStep(0);

            // Generar botones de navegación
            generateStepButtons(pasos.length);
        }

        function showStep(stepIndex) {
            const pasos = typeof instructionData.pasos === 'string' ? 
                JSON.parse(instructionData.pasos) : instructionData.pasos;

            if (stepIndex < 0 || stepIndex >= pasos.length) return;

            currentStep = stepIndex;
            const paso = pasos[stepIndex];

            // Actualizar número de paso
            document.getElementById('paso-actual').textContent = stepIndex + 1;

            // Actualizar barra de progreso
            const percentage = ((stepIndex + 1) / pasos.length) * 100;
            document.getElementById('progress-bar').style.width = percentage + '%';

            // Crear contenido de la tarjeta
            let cardHTML = `
                <div class="instruction-card">
                    <div class="instruction-header">
                        <div class="step-badge">${stepIndex + 1}</div>
                        <h3>${paso.titulo}</h3>
                    </div>
                    <p id="texto-instruccion">${paso.descripcion}</p>
            `;

            // Agregar imagen si existe
            if (paso.imagen && paso.imagen.trim() !== '') {
                cardHTML += `
                    <div class="step-image">
                        <img src="${paso.imagen}" alt="Imagen paso ${stepIndex + 1}">
                    </div>
                `;
            }

            cardHTML += `</div>`;

            // Reemplazar contenedor
            document.getElementById('contenedor-principal').innerHTML = cardHTML;

            // Generar botones de navegación
            generateStepButtons(pasos.length, stepIndex);

            // Actualizar vista de imagen si está activa
            const btnVista = document.querySelector('.view-toggle button.active');
            if (btnVista && btnVista.textContent.includes('Imagen') && paso.imagen) {
                document.getElementById('visual-content').innerHTML = `<img src="${paso.imagen}" alt="Paso ${stepIndex + 1}">`;
            }

            // Si está reproduciendo, dictar el nuevo paso
            if (isPlaying && !isMuted) {
                dictarPasoActual();
            }
        }

        function generateStepButtons(totalSteps, activeStep = 0) {
            let buttonsHTML = '<div class="step-navigation">';
            for (let i = 0; i < totalSteps; i++) {
                buttonsHTML += `
                    <button class="step-nav-btn ${i === activeStep ? 'active' : ''}" 
                            onclick="showStep(${i})">${i + 1}</button>
                `;
            }
            buttonsHTML += '</div>';

            // Agregar después de la tarjeta
            const cardElement = document.querySelector('.instruction-card');
            if (cardElement && !cardElement.nextElementSibling?.classList.contains('step-navigation')) {
                cardElement.insertAdjacentHTML('afterend', buttonsHTML);
            }
        }

        function toggleView(mode, btnElement) {
            let buttons = btnElement.parentElement.querySelectorAll('button');
            buttons.forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            const visualContent = document.getElementById('visual-content');
            const pasos = typeof instructionData.pasos === 'string' ? 
                JSON.parse(instructionData.pasos) : instructionData.pasos;
            const paso = pasos[currentStep];

            if (mode === '3d') {
                visualContent.innerHTML = '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#00E5FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>';
                visualContent.style.borderColor = "rgba(0, 229, 255, 0.3)";
                visualContent.style.background = "radial-gradient(circle, #1A3644 0%, #0F1D2B 100%)";
            } else {
                if (paso.imagen && paso.imagen.trim() !== '') {
                    visualContent.innerHTML = `<img src="${paso.imagen}" alt="Paso ${currentStep + 1}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">`;
                    visualContent.style.borderColor = "var(--text-muted)";
                    visualContent.style.background = "transparent";
                } else {
                    visualContent.innerHTML = '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#8B9BB4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>';
                }
            }
        }

        function previousStep() {
            const pasos = typeof instructionData.pasos === 'string' ? 
                JSON.parse(instructionData.pasos) : instructionData.pasos;
            
            if (currentStep > 0) {
                showStep(currentStep - 1);
            }
        }

        function togglePlayPause() {
            const btnPausa = document.getElementById('btn-pausa');
            
            if (isPlaying) {
                // Pausar
                synth.pause();
                isPlaying = false;
                btnPausa.classList.remove('paused');
                if (nextStepTimeout) clearTimeout(nextStepTimeout);
            } else {
                // Reproducir
                isPlaying = true;
                btnPausa.classList.add('paused');
                
                if (synth.paused) {
                    synth.resume();
                } else {
                    dictarPasoActual();
                }
            }
        }

        function toggleMute() {
            const btnVoz = document.getElementById('btn-voz');
            
            isMuted = !isMuted;
            
            if (isMuted) {
                synth.cancel();
                btnVoz.classList.add('muted');
                isPlaying = false;
                document.getElementById('btn-pausa').classList.remove('paused');
            } else {
                btnVoz.classList.remove('muted');
            }
        }

        function dictarPasoActual() {
            if (isMuted) return;

            const pasos = typeof instructionData.pasos === 'string' ? 
                JSON.parse(instructionData.pasos) : instructionData.pasos;
            const paso = pasos[currentStep];
            const textoADictar = paso.texto_voz || paso.descripcion;

            if (!textoADictar) return;

            synth.cancel();

            let utterance = new SpeechSynthesisUtterance(textoADictar);
            utterance.lang = 'es-ES';
            utterance.rate = 0.9;
            utterance.pitch = 1;
            utterance.volume = 1;

            utterance.onend = function() {
                if (isPlaying && !isMuted) {
                    // Esperar 15 segundos y pasar al siguiente paso
                    nextStepTimeout = setTimeout(() => {
                        const pasos = typeof instructionData.pasos === 'string' ? 
                            JSON.parse(instructionData.pasos) : instructionData.pasos;
                        
                        if (currentStep < pasos.length - 1) {
                            showStep(currentStep + 1);
                        } else {
                            // Finalizó todas las instrucciones
                            isPlaying = false;
                            document.getElementById('btn-pausa').classList.remove('paused');
                        }
                    }, 15000); // 15 segundos
                }
            };

            utterance.onerror = function(event) {
                console.error('Error en síntesis de voz:', event.error);
            };

            synth.speak(utterance);
        }

        function showError(message) {
            document.getElementById('contenedor-principal').innerHTML = `
                <div class="error-message">${message}</div>
            `;
        }
    </script>
</body>
</html>
