name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'chatbot-militar/backend/**'
      - '.github/workflows/ci-cd.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'chatbot-militar/backend/**'

jobs:
  # ==================== LINT JOB ====================
  lint:
    runs-on: ubuntu-latest
    name: Code Quality Check (ESLint)
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'chatbot-militar/backend/package-lock.json'
      
      - name: 📚 Install dependencies
        working-directory: ./chatbot-militar/backend
        run: npm install
      
      - name: 🔍 Run ESLint
        working-directory: ./chatbot-militar/backend
        run: npm run lint
        continue-on-error: true

  # ==================== UNIT TESTS JOB ====================
  test:
    runs-on: ubuntu-latest
    name: Unit Tests (Jest)
    needs: lint
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'chatbot-militar/backend/package-lock.json'
      
      - name: 📚 Install dependencies
        working-directory: ./chatbot-militar/backend
        run: npm install
      
      - name: 🧪 Run Unit Tests
        working-directory: ./chatbot-militar/backend
        run: npm test
      
      - name: 📊 Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./chatbot-militar/backend/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
        continue-on-error: true

  # ==================== BUILD JOB ====================
  build:
    runs-on: ubuntu-latest
    name: Build Backend
    needs: test
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'chatbot-militar/backend/package-lock.json'
      
      - name: 📚 Install dependencies
        working-directory: ./chatbot-militar/backend
        run: npm install
      
      - name: ✅ Verify Build
        working-directory: ./chatbot-militar/backend
        run: npm run build || echo "No build script defined"

  # ==================== SECURITY CHECK JOB ====================
  security:
    runs-on: ubuntu-latest
    name: Security Audit
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3
      
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'chatbot-militar/backend/package-lock.json'
      
      - name: 🔐 Run npm audit
        working-directory: ./chatbot-militar/backend
        run: npm audit --audit-level=moderate
        continue-on-error: true

  # ==================== NOTIFICATIONS JOB ====================
  notify:
    runs-on: ubuntu-latest
    name: Build Status Notification
    needs: [lint, test, build, security]
    if: always()
    
    steps:
      - name: ✅ All Checks Passed
        if: success()
        run: |
          echo "✅ CI/CD Pipeline Completed Successfully!"
          echo "All checks passed: Lint, Tests, Build, Security"
      
      - name: ❌ Some Checks Failed
        if: failure()
        run: |
          echo "❌ CI/CD Pipeline Failed!"
          echo "Please check the logs above for details"
        continue-on-error: true
