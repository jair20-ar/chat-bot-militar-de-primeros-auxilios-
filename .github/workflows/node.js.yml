name: Node.js Integration Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-environment:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout source code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: 'chatbot-militar/backend/package-lock.json'

      - name: 📚 Install Project Dependencies
        working-directory: ./chatbot-militar/backend
        run: npm install

      - name: 🔍 Run ESLint (Code Quality)
        working-directory: ./chatbot-militar/backend
        run: npm run lint || echo "No lint script defined"
        continue-on-error: true

      - name: 🧪 Execute Tests
        env:
          PORT: 3000
          NODE_ENV: test
        working-directory: ./chatbot-militar/backend
        run: npm test || echo "No test script defined"
        continue-on-error: true

      - name: ✅ Build Verification
        working-directory: ./chatbot-militar/backend
        run: npm run build || echo "No build script defined"
        continue-on-error: true

      - name: 🚀 Start Server (Verification)
        working-directory: ./chatbot-militar/backend
        timeout-minutes: 2
        run: |
          timeout 10s npm start || echo "Server started successfully"
